{% if page.mermaid %}
<style>
  .mermaid { text-align: center; margin: 20px 0; overflow-x: auto; }
  .mermaid svg { max-width: 100%; height: auto; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/9.4.3/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: false,
    theme: 'default',
    securityLevel: 'loose',
    flowchart: {
      useMaxWidth: true,
      htmlLabels: true
    }
  });
  mermaid.init(undefined, document.querySelectorAll('pre code.language-mermaid'));
</script>
{% endif %}
